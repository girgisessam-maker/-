<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دورى ابطال الشهداء 2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-mid: #9FE1CB;
    --teal-dark: #085041;
    --bg: #f7f8fa;
    --card-bg: #ffffff;
    --text-primary: #1a1a2e;
    --text-secondary: #6b7280;
    --text-tertiary: #9ca3af;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.15);
    --radius-md: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px 16px 40px;
  }

  .container { max-width: 480px; margin: 0 auto; }

    .header-logos {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .logo-pill img{
    width: 90px;
    height: 75px;
  }

  .logo-pill {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.5;
  }
  .logo-pill1 img{
    width: 80px;
    height: 90px;
  }
  .logo-pill1 {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.5;
  }

  .page-header { margin-bottom: 20px; }
  .page-title { font-size: 26px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; margin-bottom: 4px; }
  .page-sub { font-size: 14px; color: var(--text-secondary); }

  .sport-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }

  .sport-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 12px 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    user-select: none;
  }
  .sport-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
  .sport-card:active { transform: scale(0.97); }
  .sport-card.active { border: 2px solid var(--teal); background: var(--teal-light); }

  .sport-icon-wrap {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    transition: background 0.2s;
  }
  .sport-card.active .sport-icon-wrap { background: var(--teal-mid); }
  .sport-icon-svg { width: 28px; height: 28px; }
  .sport-card-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); transition: color 0.2s; }
  .sport-card.active .sport-card-label { color: var(--teal-dark); }

  .tabs {
    display: flex;
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 4px; gap: 4px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1; padding: 9px 0; border-radius: 8px; border: none;
    background: transparent; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); cursor: pointer; font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active { background: var(--teal); color: #fff; }

  /* جدول واحد */
  .section-card {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  /* مجموعتين كورة */
  .groups-wrap { display: flex; flex-direction: column; gap: 14px; }
  .group-label {
    font-size: 13px; font-weight: 700; color: var(--teal-dark);
    background: var(--teal-light);
    padding: 8px 14px;
    border-bottom: 0.5px solid rgba(29,158,117,0.2);
  }

  .table-head {
    display: grid; padding: 10px 16px;
    background: var(--bg);
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.6px;
    border-bottom: 0.5px solid var(--border);
  }
  .table-row {
    display: grid; padding: 13px 16px;
    border-bottom: 0.5px solid var(--border);
    align-items: center; font-size: 14px; color: var(--text-primary);
    transition: background 0.1s;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--bg); }

  .rank-badge {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .r1 { background: #FFF3CD; color: #856404; }
  .r2 { background: #e8e8e8; color: #5a5a5a; }
  .r3 { background: #FAECE7; color: #712B13; }
  .rn { background: transparent; color: var(--text-tertiary); font-size: 13px; }

  .name { font-weight: 600; }
  .team-small { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
  .num { text-align: center; color: var(--text-secondary); }
  .pts { font-weight: 700; color: var(--teal); text-align: center; font-size: 15px; }
  .goals-pill {
    background: var(--teal-light); color: var(--teal-dark);
    border-radius: 20px; padding: 3px 12px;
    font-size: 12px; font-weight: 700; display: inline-block;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header-logos">
    <div class="logo-pill"><img src="./122.png" alt=""></div>
    <div class="logo-pill1"><img  src="./212.png" alt=""></div>
    <div class="logo-pill"><img src="./123.png" alt=""></div>
  </div>

  <div class="page-header">
    <div class="page-title">الترتيب</div>
    <div class="page-sub">اختر النشاط لعرض الترتيب</div>
  </div>

  <div class="sport-grid">
    <div class="sport-card active" onclick="selectSport('football',this)">
      <div class="sport-icon-wrap">⚽</div>
      <span class="sport-card-label">كرة قدم</span>
    </div>
    <div class="sport-card" onclick="selectSport('chess',this)">
      <div class="sport-icon-wrap">♟️</div>
      <span class="sport-card-label">شطرنج</span>
    </div>
    <div class="sport-card" onclick="selectSport('volleyball',this)">
      <div class="sport-icon-wrap">🏐</div>
      <span class="sport-card-label">طايرة</span>
    </div>
    <div class="sport-card" onclick="selectSport('domino',this)">
      <div class="sport-icon-wrap">
        <svg class="sport-icon-svg" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="4" width="22" height="10" rx="3" stroke="#6b7280" stroke-width="1.8"/>
          <line x1="14" y1="4" x2="14" y2="14" stroke="#6b7280" stroke-width="1.5"/>
          <circle cx="8.5" cy="9" r="1.5" fill="#6b7280"/>
          <circle cx="19.5" cy="7" r="1.3" fill="#6b7280"/>
          <circle cx="19.5" cy="11" r="1.3" fill="#6b7280"/>
          <rect x="3" y="16" width="22" height="10" rx="3" stroke="#6b7280" stroke-width="1.8"/>
          <line x1="14" y1="16" x2="14" y2="26" stroke="#6b7280" stroke-width="1.5"/>
          <circle cx="8.5" cy="20" r="1.3" fill="#6b7280"/>
          <circle cx="8.5" cy="22.5" r="1.3" fill="#6b7280"/>
          <circle cx="19.5" cy="21" r="1.5" fill="#6b7280"/>
        </svg>
      </div>
      <span class="sport-card-label">دومنه</span>
    </div>
  </div>

  <div id="tabs-wrap" class="tabs">
    <button class="tab active" onclick="selectTab('standings',this)">ترتيب الفرق</button>
    <button class="tab" onclick="selectTab('scorers',this)">الهدافين</button>
  </div>

  <div id="content-area"></div>
</div>

<!-- البيانات من ملف database.js -->
<script src="database.js"></script>

<script>
  let cur = 'football', curTab = 'standings';

  function rankCls(r) {
    return r === 1 ? 'r1' : r === 2 ? 'r2' : r === 3 ? 'r3' : 'rn';
  }

  function selectSport(s, el) {
    cur = s; curTab = 'standings';
    document.querySelectorAll('.sport-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const tw = document.getElementById('tabs-wrap');
    if (s === 'football') {
      tw.innerHTML = `
        <button class="tab active" onclick="selectTab('standings',this)">ترتيب الفرق</button>
        <button class="tab" onclick="selectTab('scorers',this)">الهدافين</button>`;
    } else {
      tw.innerHTML = `<button class="tab active" onclick="selectTab('standings',this)">ترتيب الفرق</button>`;
    }
    render();
  }

  function selectTab(t, el) {
    curTab = t;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  // جدول ترتيب - كورة (مع تعادل)
  function standingsTableFootball(rows) {
    return `
      <div class="table-head" style="grid-template-columns:34px 1fr 32px 32px 32px 44px">
        <span>#</span><span>الفريق</span>
        <span style="text-align:center">ف</span>
        <span style="text-align:center">ت</span>
        <span style="text-align:center">خ</span>
        <span style="text-align:center">نقاط</span>
      </div>
      ${rows.map(t => `
        <div class="table-row" style="grid-template-columns:34px 1fr 32px 32px 32px 44px">
          <span class="rank-badge ${rankCls(t.rank)}">${t.rank}</span>
          <span class="name">${t.name}</span>
          <span class="num">${t.w}</span>
          <span class="num">${t.d}</span>
          <span class="num">${t.l}</span>
          <span class="pts">${t.pts}</span>
        </div>
      `).join('')}
    `;
  }

  // جدول ترتيب - بدون تعادل (طايرة / دومنه)
  function standingsTableNoDraws(rows, nameCol) {
    return `
      <div class="table-head" style="grid-template-columns:34px 1fr 32px 32px 44px">
        <span>#</span><span>${nameCol}</span>
        <span style="text-align:center">ف</span>
        <span style="text-align:center">خ</span>
        <span style="text-align:center">نقاط</span>
      </div>
      ${rows.map(t => `
        <div class="table-row" style="grid-template-columns:34px 1fr 32px 32px 44px">
          <span class="rank-badge ${rankCls(t.rank)}">${t.rank}</span>
          <span class="name">${t.name}</span>
          <span class="num">${t.w}</span>
          <span class="num">${t.l}</span>
          <span class="pts">${t.pts}</span>
        </div>
      `).join('')}
    `;
  }

  // جدول ترتيب - شطرنج (مع تعادل)
  function standingsTableChess(rows) {
    return `
      <div class="table-head" style="grid-template-columns:34px 1fr 32px 32px 32px 44px">
        <span>#</span><span>اللاعب</span>
        <span style="text-align:center">ف</span>
        <span style="text-align:center">ت</span>
        <span style="text-align:center">خ</span>
        <span style="text-align:center">نقاط</span>
      </div>
      ${rows.map(t => `
        <div class="table-row" style="grid-template-columns:34px 1fr 32px 32px 32px 44px">
          <span class="rank-badge ${rankCls(t.rank)}">${t.rank}</span>
          <span class="name">${t.name}</span>
          <span class="num">${t.w}</span>
          <span class="num">${t.d}</span>
          <span class="num">${t.l}</span>
          <span class="pts">${t.pts}</span>
        </div>
      `).join('')}
    `;
  }

  function render() {
    const area = document.getElementById('content-area');

    // ======= كورة القدم =======
    if (cur === 'football') {
      if (curTab === 'standings') {
        area.innerHTML = `
          <div class="groups-wrap">
            <div class="section-card">
              <div class="group-label">${data.football.groupA.name}</div>
              ${standingsTableFootball(data.football.groupA.standings)}
            </div>
            <div class="section-card">
              <div class="group-label">${data.football.groupB.name}</div>
              ${standingsTableFootball(data.football.groupB.standings)}
            </div>
          </div>
        `;
      } else {
        area.innerHTML = `
          <div class="section-card">
            <div class="table-head" style="grid-template-columns:34px 1fr 60px">
              <span>#</span><span>اللاعب</span><span style="text-align:center">أهداف</span>
            </div>
            ${data.football.scorers.map(s => `
              <div class="table-row" style="grid-template-columns:34px 1fr 60px">
                <span class="rank-badge ${rankCls(s.rank)}">${s.rank}</span>
                <div>
                  <div class="name">${s.name}</div>
                  <div class="team-small">${s.team}</div>
                </div>
                <span style="text-align:center"><span class="goals-pill">${s.goals}</span></span>
              </div>
            `).join('')}
          </div>
        `;
      }
      return;
    }

    // ======= شطرنج =======
    if (cur === 'chess') {
      area.innerHTML = `<div class="section-card">${standingsTableChess(data.chess.standings)}</div>`;
      return;
    }

    // ======= طايرة (بدون تعادل) =======
    if (cur === 'volleyball') {
      area.innerHTML = `<div class="section-card">${standingsTableNoDraws(data.volleyball.standings, 'الفريق')}</div>`;
      return;
    }

    // ======= دومنه (بدون تعادل) =======
    if (cur === 'domino') {
      area.innerHTML = `<div class="section-card">${standingsTableNoDraws(data.domino.standings, 'الفريق')}</div>`;
      return;
    }
  }

  render();
</script>
</body>
</html>
